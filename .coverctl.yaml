version: 1
language: go
policy:
  default:
    min: 80
  domains:
    - name: cmd
      match:
        - ./cmd/...
      min: 0
    - name: auth
      match:
        - ./internal/auth/...
      min: 95
    - name: config
      match:
        - ./internal/config/...
      min: 80
    - name: domain
      match:
        - ./internal/domain/...
      min: 80
    - name: mcp
      match:
        - ./internal/mcp/...
      min: 80
    - name: mcpui
      match:
        - ./internal/mcpui/...
      min: 80
    - name: seed
      match:
        - ./internal/seed/...
      min: 80
    - name: storage
      match:
        - ./internal/storage/...
      min: 80
    - name: events
      match:
        - ./internal/events/...
      min: 80
    - name: dashboard
      match:
        - ./internal/dashboard/...
      min: 80
    - name: lifecycle
      match:
        - ./internal/lifecycle/...
      min: 80
    - name: webhook
      match:
        - ./internal/webhook/...
      min: 80
